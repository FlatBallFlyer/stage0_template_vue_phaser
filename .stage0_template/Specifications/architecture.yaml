architecture:
  organization: Agile Learning Institute
  product: Game Star
  environments:
    - name: local
  domains:
    - name: game
      description: Sample Game Service
      data_domains:
        controls:
          - Control
        creates:
          - Create
        consumes:
          - Consume
      repos:
        - name: game_api
          description: Flask API with MongoDB Database
          template: agile-learning-institute/stage0_template_flask_mongo
          publish: pipenv
          type: api
          port: 8389
        - name: game_spa
          description: Vue Phaser Game SPA
          template: agile-learning-institute/stage0_template_vue_phaser
          publish: npm
          type: spa
          port: 8390
